services:
  warehouse:
    build:
      context: ..
      dockerfile: Dockerfile
    image: warehouse:local
    # Run with cwd inside the mounted repo so .git is found (do not set WAREHOUSE_WORKDIR unless you mount that path).
    working_dir: /data/repo
    environment:
      WAREHOUSE_GIT_BRANCH: ${WAREHOUSE_GIT_BRANCH:-main}
      WAREHOUSE_GIT_REMOTE: ${WAREHOUSE_GIT_REMOTE:-origin}
      WAREHOUSE_MANIFEST_PATH: ${WAREHOUSE_MANIFEST_PATH:-manifest/urls.csv}
      WAREHOUSE_DOWNLOAD_DIR: /data/downloads
      WAREHOUSE_GIT_AUTHOR_NAME: ${WAREHOUSE_GIT_AUTHOR_NAME:-warehouse-bot}
      WAREHOUSE_GIT_AUTHOR_EMAIL: ${WAREHOUSE_GIT_AUTHOR_EMAIL:-warehouse-bot@local}
      # Optional: only for first-time `warehouse init` clone into an empty /data/repo
      # WAREHOUSE_GIT_URL: ${WAREHOUSE_GIT_URL}
    volumes:
      # Mount the real git checkout (parent of `deploy/` = project root, includes `.git`).
      - ..:/data/repo
      - ../warehouse-data/downloads:/data/downloads
      # GitHub over SSH: mount your host keys (same as logging in with ssh on the server).
      # Ensure `git remote get-url origin` inside the repo is git@github.com:ORG/REPO.git (not https).
      - ${HOME}/.ssh:/root/.ssh:ro
    # Binary is on PATH (`/usr/local/bin/warehouse`); cwd is /data/repo for git.
    command: ["warehouse", "list", "--pull"]
